name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-test-lint:
    runs-on: self-hosted

    if: >-
      github.event_name == 'push' || (
        github.event.pull_request.head.repo.full_name == github.repository
        && github.actor != 'dependabot[bot]'
        && contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association)
      )

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.5'
        cache: true

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          gcc \
          libwayland-dev \
          libx11-dev \
          libx11-xcb-dev \
          libxkbcommon-x11-dev \
          libgles2-mesa-dev \
          libegl1-mesa-dev \
          libffi-dev \
          libxcursor-dev \
          libvulkan-dev

    - name: Lint (go vet)
      run: go vet ./...

    - name: Build
      run: go build -v -o bin/tracto ./cmd

    - name: Run tests
      run: go test -v -cover ./...
