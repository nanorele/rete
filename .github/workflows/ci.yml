name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test-lint:
    runs-on: self-hosted
    # Targeting Ubuntu as requested
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.5'
        cache: true

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          gcc \
          libwayland-dev \
          libx11-dev \
          libx11-xcb-dev \
          libxkbcommon-x11-dev \
          libgles2-mesa-dev \
          libegl1-mesa-dev \
          libffi-dev \
          libxcursor-dev \
          libvulkan-dev

    - name: Lint (go vet)
      run: go vet ./...

    - name: Build
      run: go build -v -o bin/tracto ./cmd

    - name: Run tests
      run: go test -v -cover ./...
